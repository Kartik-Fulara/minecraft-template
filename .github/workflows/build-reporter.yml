name: Universal Build & Report

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  orchestrate-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
      changelog_b64: ${{ steps.notes.outputs.changelog_b64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 1. Versioning ──────────────────────────────────────────────
      - name: Read VERSION
        id: ver
        run: |
          if [[ -f VERSION ]]; then
            VERSION=$(tr -d '[:space:]' < VERSION)
          else
            VERSION="1.0.${{ github.run_number }}"
          fi
          echo "version=$VERSION"  >> $GITHUB_OUTPUT
          echo "tag=v$VERSION"     >> $GITHUB_OUTPUT

      # ── 2. Changelog + Description (base64-encoded for safe JSON) ──
      - name: Extract Changelog & Description
        id: notes
        run: |
          python3 - "${{ steps.ver.outputs.version }}" <<'PYEOF'
          import re, sys, os, base64

          version = sys.argv[1]
          notes   = f"Release {version}"

          # --- Changelog ---
          if os.path.exists("CHANGELOG.md"):
              with open("CHANGELOG.md", encoding="utf-8") as f:
                  content = f.read()
              pattern = (r"(?m)^## \[" + re.escape(version)
                         + r"\][^\n]*\n(.*?)(?=\n## |\n---|\Z)")
              m = re.search(pattern, content, re.DOTALL)
              if m:
                  notes = m.group(1).strip()

          # --- Description (README, capped at 2 000 chars) ---
          description = notes
          if os.path.exists("README.md"):
              with open("README.md", encoding="utf-8") as f:
                  description = f.read()[:2000]

          # Write human-readable version for the GitHub Release
          with open("extracted_notes.md", "w", encoding="utf-8") as out:
              out.write(notes)

          # Base64-encode for safe transport in JSON payloads
          notes_b64 = base64.b64encode(notes.encode()).decode()
          desc_b64  = base64.b64encode(description.encode()).decode()

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"changelog_b64={notes_b64}\n")
              f.write(f"description_b64={desc_b64}\n")
          PYEOF

      # ── 3. Language Detection & Build ─────────────────────────────
      - name: Detect & Build
        id: build
        run: |
          # Create dummy .pipeline-ready if it doesn't exist to allow CI build
          # (Normally it should exist after init, but this makes the workflow robust)
          touch .pipeline-ready

          if [ -f "package.json" ]; then
            echo "mode=node" >> $GITHUB_OUTPUT
            npm ci && npm run build --if-present
            echo "artifact=dist/" >> $GITHUB_OUTPUT

          elif [ -f "pom.xml" ]; then
            echo "mode=java" >> $GITHUB_OUTPUT
            mvn --batch-mode versions:set \
              -DnewVersion="${{ steps.ver.outputs.version }}" \
              -DgenerateBackupPoms=false
            mvn --batch-mode clean package -DskipTests
            echo "artifact=target/*.jar" >> $GITHUB_OUTPUT

          elif [ -f "Cargo.toml" ]; then
            echo "mode=rust" >> $GITHUB_OUTPUT
            cargo build --release
            echo "artifact=target/release/" >> $GITHUB_OUTPUT

          elif [ -f "go.mod" ]; then
            echo "mode=go" >> $GITHUB_OUTPUT
            go build -v ./...
            echo "artifact=./*" >> $GITHUB_OUTPUT

          else
            echo "mode=generic" >> $GITHUB_OUTPUT
            echo "artifact=." >> $GITHUB_OUTPUT
          fi

      # ── 4. GitHub Release ─────────────────────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          FILES=$(ls ${{ steps.build.outputs.artifact }} 2>/dev/null \
            | grep -v "original" | head -n 5 || true)

          gh release create "$TAG" \
            --title "Release ${{ steps.ver.outputs.version }}" \
            --notes-file extracted_notes.md \
            $FILES \
          || {
            EXIT=$?
            if gh release view "$TAG" &>/dev/null; then
              echo "Release $TAG already exists — skipping."
            else
              echo "Release creation failed with exit $EXIT"
              exit $EXIT
            fi
          }

      # ── 5. Generate Secret ID ─────────────────────────────────────
      - name: Generate Secret ID
        id: secret_id
        run: |
          SECRET_ID=$(echo "${{ github.repository }}" \
            | tr '[:upper:]' '[:lower:]' \
            | tr '/[:space:]' '-' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/--*/-/g')
          echo "secret_id=$SECRET_ID" >> $GITHUB_OUTPUT

      # ── 6. Report to Central Hub ──────────────────────────────────
      - name: Report to Hub
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HUB_PAT }}
          repository: ${{ secrets.HUB_REPOSITORY }}
          event-type: incoming-build
          client-payload: |
            {
              "source_repo":     "${{ github.repository }}",
              "version":         "${{ steps.ver.outputs.version }}",
              "changelog_b64":   "${{ steps.notes.outputs.changelog_b64 }}",
              "description_b64": "${{ steps.notes.outputs.description_b64 }}",
              "mode":            "${{ steps.build.outputs.mode }}",
              "secret_id":       "${{ steps.secret_id.outputs.secret_id }}"
            }
